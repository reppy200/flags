<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer scope circle -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Inner scope circle -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#FFD700" stroke-width="1"/>
  
  <!-- Crosshair lines -->
  <g stroke="#FFD700" stroke-width="1.5" fill="none">
    <!-- Vertical line -->
    <line x1="16" y1="2" x2="16" y2="30"/>
    <!-- Horizontal line -->
    <line x1="2" y1="16" x2="30" y2="16"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1" fill="#FFD700"/>
  
  <!-- Range markers -->
  <g stroke="#FFD700" stroke-width="1" fill="none">
    <!-- Top -->
    <line x1="14" y1="4" x2="18" y2="4"/>
    <line x1="15" y1="6" x2="17" y2="6"/>
    
    <!-- Bottom -->
    <line x1="14" y1="28" x2="18" y2="28"/>
    <line x1="15" y1="26" x2="17" y2="26"/>
    
    <!-- Left -->
    <line x1="4" y1="14" x2="4" y2="18"/>
    <line x1="6" y1="15" x2="6" y2="17"/>
    
    <!-- Right -->
    <line x1="28" y1="14" x2="28" y2="18"/>
    <line x1="26" y1="15" x2="26" y2="17"/>
  </g>
  
  <!-- Corner elements for tactical look -->
  <g stroke="#FFD700" stroke-width="1" fill="none" opacity="0.7">
    <path d="M 3 3 L 3 6 M 3 3 L 6 3"/>
    <path d="M 29 3 L 29 6 M 29 3 L 26 3"/>
    <path d="M 3 29 L 3 26 M 3 29 L 6 29"/>
    <path d="M 29 29 L 29 26 M 29 29 L 26 29"/>
  </g>
</svg>