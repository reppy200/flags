<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for better visibility -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>
  
  <!-- Main crosshair -->
  <g stroke="#00FF00" stroke-width="2" fill="none">
    <!-- Vertical line with gap -->
    <line x1="16" y1="4" x2="16" y2="10"/>
    <line x1="16" y1="22" x2="16" y2="28"/>
    
    <!-- Horizontal line with gap -->
    <line x1="4" y1="16" x2="10" y2="16"/>
    <line x1="22" y1="16" x2="28" y2="16"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#00FF00"/>
  
  <!-- Corner brackets for tactical look -->
  <g stroke="#00FF00" stroke-width="1.5" fill="none">
    <!-- Top-left -->
    <path d="M 8 8 L 8 11 M 8 8 L 11 8"/>
    <!-- Top-right -->
    <path d="M 24 8 L 24 11 M 24 8 L 21 8"/>
    <!-- Bottom-left -->
    <path d="M 8 24 L 8 21 M 8 24 L 11 24"/>
    <!-- Bottom-right -->
    <path d="M 24 24 L 24 21 M 24 24 L 21 24"/>
  </g>
</svg>