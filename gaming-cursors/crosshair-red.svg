<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for better visibility -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>
  
  <!-- Main crosshair -->
  <g stroke="#FF0000" stroke-width="2" fill="none">
    <!-- Vertical line -->
    <line x1="16" y1="6" x2="16" y2="12"/>
    <line x1="16" y1="20" x2="16" y2="26"/>
    
    <!-- Horizontal line -->
    <line x1="6" y1="16" x2="12" y2="16"/>
    <line x1="20" y1="16" x2="26" y2="16"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#FF0000"/>
  
  <!-- Outer glow effect -->
  <g stroke="#FF6666" stroke-width="1" fill="none" opacity="0.5">
    <line x1="16" y1="5" x2="16" y2="11"/>
    <line x1="16" y1="21" x2="16" y2="27"/>
    <line x1="5" y1="16" x2="11" y2="16"/>
    <line x1="21" y1="16" x2="27" y2="16"/>
  </g>
</svg>