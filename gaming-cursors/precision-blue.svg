<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer frame -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#00BFFF" stroke-width="1" opacity="0.3"/>
  
  <!-- Main crosshair -->
  <g stroke="#00BFFF" stroke-width="2" fill="none">
    <!-- Vertical line -->
    <line x1="16" y1="8" x2="16" y2="14"/>
    <line x1="16" y1="18" x2="16" y2="24"/>
    
    <!-- Horizontal line -->
    <line x1="8" y1="16" x2="14" y2="16"/>
    <line x1="18" y1="16" x2="24" y2="16"/>
  </g>
  
  <!-- Center square -->
  <rect x="14" y="14" width="4" height="4" fill="none" stroke="#00BFFF" stroke-width="1"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1" fill="#00BFFF"/>
  
  <!-- Corner indicators -->
  <g stroke="#00BFFF" stroke-width="1.5" fill="none">
    <!-- Top-left -->
    <path d="M 6 6 L 6 10 M 6 6 L 10 6"/>
    <!-- Top-right -->
    <path d="M 26 6 L 26 10 M 26 6 L 22 6"/>
    <!-- Bottom-left -->
    <path d="M 6 26 L 6 22 M 6 26 L 10 26"/>
    <!-- Bottom-right -->
    <path d="M 26 26 L 26 22 M 26 26 L 22 26"/>
  </g>
  
  <!-- Precision markers -->
  <g stroke="#00BFFF" stroke-width="1" fill="none" opacity="0.6">
    <circle cx="16" cy="16" r="6" stroke-dasharray="2,2"/>
    <circle cx="16" cy="16" r="10" stroke-dasharray="1,3"/>
  </g>
</svg>