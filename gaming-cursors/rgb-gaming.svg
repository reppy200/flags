<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- RGB gradient for the main crosshair -->
    <linearGradient id="rgbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0080;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#0080FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#80FF00;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#FF8000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF0080;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow circle -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#rgbGradient)" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Main crosshair -->
  <g stroke="url(#rgbGradient)" stroke-width="3" fill="none" filter="url(#glow)">
    <!-- Vertical line -->
    <line x1="16" y1="4" x2="16" y2="12"/>
    <line x1="16" y1="20" x2="16" y2="28"/>
    
    <!-- Horizontal line -->
    <line x1="4" y1="16" x2="12" y2="16"/>
    <line x1="20" y1="16" x2="28" y2="16"/>
  </g>
  
  <!-- RGB corner brackets -->
  <g stroke-width="2" fill="none">
    <!-- Top-left (Red) -->
    <g stroke="#FF0040">
      <path d="M 6 6 L 6 10 M 6 6 L 10 6"/>
    </g>
    <!-- Top-right (Blue) -->
    <g stroke="#0040FF">
      <path d="M 26 6 L 26 10 M 26 6 L 22 6"/>
    </g>
    <!-- Bottom-left (Green) -->
    <g stroke="#40FF00">
      <path d="M 6 26 L 6 22 M 6 26 L 10 26"/>
    </g>
    <!-- Bottom-right (Purple) -->
    <g stroke="#FF0040">
      <path d="M 26 26 L 26 22 M 26 26 L 22 26"/>
    </g>
  </g>
  
  <!-- Center element -->
  <circle cx="16" cy="16" r="3" fill="none" stroke="url(#rgbGradient)" stroke-width="2"/>
  <circle cx="16" cy="16" r="1.5" fill="url(#rgbGradient)"/>
  
  <!-- Animated RGB dots (would be animated with CSS) -->
  <g fill="none" opacity="0.8">
    <circle cx="16" cy="8" r="1" fill="#FF0040"/>
    <circle cx="24" cy="16" r="1" fill="#0040FF"/>
    <circle cx="16" cy="24" r="1" fill="#40FF00"/>
    <circle cx="8" cy="16" r="1" fill="#FF8000"/>
  </g>
  
  <!-- Gaming aesthetic lines -->
  <g stroke="url(#rgbGradient)" stroke-width="1" fill="none" opacity="0.4">
    <line x1="2" y1="2" x2="6" y2="6"/>
    <line x1="30" y1="2" x2="26" y2="6"/>
    <line x1="2" y1="30" x2="6" y2="26"/>
    <line x1="30" y1="30" x2="26" y2="26"/>
  </g>
  
  <!-- Digital grid pattern -->
  <g stroke="url(#rgbGradient)" stroke-width="0.5" fill="none" opacity="0.2">
    <line x1="8" y1="0" x2="8" y2="32"/>
    <line x1="24" y1="0" x2="24" y2="32"/>
    <line x1="0" y1="8" x2="32" y2="8"/>
    <line x1="0" y1="24" x2="32" y2="24"/>
  </g>
</svg>