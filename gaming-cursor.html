<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Cursor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23, #1a1a2e, #16213e);
            min-height: 100vh;
            cursor: none;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #00ff88, #00cc6a);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            box-shadow: 
                0 0 10px #00ff88,
                0 0 20px #00ff88,
                0 0 30px #00ff88;
        }

        .cursor::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            width: 40px;
            height: 40px;
            border: 2px solid #00ff88;
            border-radius: 50%;
            opacity: 0.5;
            animation: pulse 1.5s infinite;
        }

        .cursor::after {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            width: 50px;
            height: 50px;
            border: 1px solid #00ff88;
            border-radius: 50%;
            opacity: 0.3;
            animation: pulse 1.5s infinite 0.5s;
        }

        .cursor.clicking {
            transform: scale(1.5);
            background: radial-gradient(circle, #ff0080, #cc0066);
            box-shadow: 
                0 0 15px #ff0080,
                0 0 30px #ff0080,
                0 0 45px #ff0080;
        }

        .cursor.clicking::before,
        .cursor.clicking::after {
            border-color: #ff0080;
        }

        .trail {
            position: fixed;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #00ff88, transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: fadeOut 0.8s ease-out forwards;
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #00ff88;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9997;
            animation: particleMove 1s ease-out forwards;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.3);
            }
        }

        @keyframes particleMove {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0);
            }
        }

        .demo-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #00ff88;
            font-size: 2rem;
            text-shadow: 0 0 10px #00ff88;
        }

        .demo-button {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border: none;
            padding: 15px 30px;
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            margin: 20px;
            cursor: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .demo-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 30px rgba(0, 255, 136, 0.5);
        }

        .crosshair {
            position: fixed;
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #00ff88;
            box-shadow: 0 0 5px #00ff88;
        }

        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }

        .crosshair::after {
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }

        .crosshair.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="crosshair" id="crosshair"></div>
    
    <div class="demo-content">
        <h1>🎮 Gaming Cursor Demo 🎮</h1>
        <p>Move your mouse around and click to see the effects!</p>
        <button class="demo-button" onclick="toggleCrosshair()">Toggle Crosshair Mode</button>
        <button class="demo-button" onclick="createExplosion()">Create Explosion</button>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const crosshair = document.getElementById('crosshair');
        let mouseX = 0;
        let mouseY = 0;
        let trailCount = 0;
        let crosshairMode = false;

        // Smooth cursor movement
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursor.style.left = mouseX - 10 + 'px';
            cursor.style.top = mouseY - 10 + 'px';
            
            crosshair.style.left = mouseX - 15 + 'px';
            crosshair.style.top = mouseY - 15 + 'px';
            
            // Create trail effect
            if (trailCount % 3 === 0) {
                createTrail(mouseX, mouseY);
            }
            trailCount++;
        });

        // Click effects
        document.addEventListener('mousedown', (e) => {
            cursor.classList.add('clicking');
            createParticles(e.clientX, e.clientY);
        });

        document.addEventListener('mouseup', () => {
            cursor.classList.remove('clicking');
        });

        // Create trail particles
        function createTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'trail';
            trail.style.left = x - 3 + 'px';
            trail.style.top = y - 3 + 'px';
            document.body.appendChild(trail);
            
            setTimeout(() => {
                trail.remove();
            }, 800);
        }

        // Create click particles
        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const angle = (Math.PI * 2 * i) / 8;
                const distance = 50 + Math.random() * 30;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                
                particle.style.setProperty('--dx', dx + 'px');
                particle.style.setProperty('--dy', dy + 'px');
                particle.style.left = x - 2 + 'px';
                particle.style.top = y - 2 + 'px';
                
                document.body.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // Toggle crosshair mode
        function toggleCrosshair() {
            crosshairMode = !crosshairMode;
            if (crosshairMode) {
                crosshair.classList.add('active');
                cursor.style.opacity = '0.3';
            } else {
                crosshair.classList.remove('active');
                cursor.style.opacity = '1';
            }
        }

        // Create explosion effect
        function createExplosion() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const x = mouseX + (Math.random() - 0.5) * 100;
                    const y = mouseY + (Math.random() - 0.5) * 100;
                    createParticles(x, y);
                }, i * 50);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') {
                toggleCrosshair();
            }
            if (e.key === ' ') {
                e.preventDefault();
                createExplosion();
            }
        });

        // Initialize cursor position
        cursor.style.left = '50%';
        cursor.style.top = '50%';
    </script>
</body>
</html>
